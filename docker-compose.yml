services:
  backend:
    build: ./
    command: python manage.py runserver 0.0.0.0:8080
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    environment:
      - DEBUG=1
      - POSTGRES_DB=neighbor_service_db
      - POSTGRES_USER=ns_user
      - POSTGRES_PASSWORD=ns_password
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DATABASE=postgres
      - REDIS_HOST=redis
      - DJANGO_SUPERUSER_PASSWORD=gyenyame
      - DJANGO_SUPERUSER_EMAIL=afari@thinkce.org
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=neighbor_service_db
      - POSTGRES_USER=ns_user
      - POSTGRES_PASSWORD=ns_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"

  worker:
    build: ./
    command: celery -A ns_backend worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - POSTGRES_DB=neighbor_service_db
      - POSTGRES_USER=ns_user
      - POSTGRES_PASSWORD=ns_password
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DATABASE=postgres
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
